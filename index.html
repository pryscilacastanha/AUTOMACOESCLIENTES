<link rel="stylesheet" href="css/chat.css?v=2.4">
<link rel="stylesheet" href="css/verificacao-docs.css?v=1.0">
<script>
  function resetarDados() {
    if (!confirm('Apagar todos os dados operacionais e recarregar base dos clientes?')) return;
    localStorage.clear();
    location.reload();
  }
  // Inicialização — DOMContentLoaded garante todos os scripts carregados
  document.addEventListener('DOMContentLoaded', () => {
    try {
      if (typeof bootstrapAppOnce === 'function') bootstrapAppOnce();
      else if (typeof bootstrapApp === 'function') bootstrapApp();
      // Carregar planos de contas SCI pré-embutidos
      if (typeof seedPlanosContas === 'function') seedPlanosContas();
    } catch(e) {
      console.error('[index.html] bootstrapApp falhou:', e);
    }
  });
  // Fallback de segurança — garante seed após load completo
  window.addEventListener('load', () => {
    const el = document.getElementById('gemini-status-sidebar');
    if (el) el.textContent = (typeof getApiKey === 'function' && getApiKey()) ? '🤖 Gemini AI ativo' : '';
    // Carregar GOOGLE_CLIENT_ID salvo nas configs
    const cfg = JSON.parse(localStorage.getItem('app_config') || '{}');
    if (cfg.google_client_id) window.GOOGLE_CLIENT_ID = cfg.google_client_id;
    // Se clientes vazio, tenta seed novamente
    const c = JSON.parse(localStorage.getItem('clientes') || '[]');
    if (c.length === 0 && typeof initSeed === 'function') {
      console.log('[Fallback] Clientes vazio, rodando initSeed...');
      if (typeof initDB === 'function') initDB();
      initSeed();
      if (typeof navigate === 'function') navigate('dashboard');
    }
  });
</script>
  <!-- AI Chat Agent Widget -->
  <button class="ai-chat-btn" onclick="AI_AGENT.toggle()">🤖</button>
  <div class="ai-chat-window" id="ai-chat-window">

    </div>
    <div class="ai-chat-messages" id="ai-chat-messages"></div>
    <div class="ai-chat-input">
      <input type="text" id="ai-chat-input-text" placeholder="Pergunte algo à IA..." onkeypress="if(event.key==='Enter') AI_AGENT.sendMessage()">
      <button id="ai-chat-submit" onclick="AI_AGENT.sendMessage()">Enviar</button>
    </div>
