<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pryscila Castanha — Automação de Clientes</title>
  <meta name="description" content="Sistema de automação e onboarding de clientes — Pryscila Castanha Consultoria Contábil">
  <link rel="stylesheet" href="css/app.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ── -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">
        <div class="logo-icon">📊</div>
        <div>
          <div class="logo-text">Pryscila Castanha</div>
          <div class="logo-sub">Automação de Clientes</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">🏢</span><span>Carteira de Clientes</span>
      </button>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <button class="nav-item" data-page="treinamento" onclick="navigate('treinamento')">
        <span class="nav-icon">🎓</span><span>Treinamento</span>
      </button>
      <button class="nav-item" data-page="educacao" onclick="navigate('educacao')">
        <span class="nav-icon">📖</span><span>Educação Cliente</span>
      </button>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <button class="nav-item" data-page="configuracoes" onclick="navigate('configuracoes')">
        <span class="nav-icon">⚙️</span><span>Configurações</span>
      </button>
    </div>

    <div style="padding:16px 20px;margin-top:auto;border-top:1px solid rgba(255,255,255,.07)">
      <div style="font-size:11px;color:#475569;line-height:1.7">
        <div style="color:#64748b;font-weight:600;margin-bottom:2px" id="sidebar-count"></div>
        Sistema Automação v3.0<br>
        <span id="gemini-status-sidebar" style="color:#10b981"></span>
      </div>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="topbar">
      <div>
        <div id="topbar-title" class="topbar-title">Carteira de Clientes</div>
        <div class="topbar-sub">Pryscila Castanha — Consultoria Contábil</div>
      </div>
      <div class="topbar-actions">
        <label style="font-size:13px;font-weight:600;color:var(--text-muted)">Competência:</label>
        <input type="month" id="comp-topbar" class="competencia-select">
        <button class="btn btn-primary" onclick="navigate('clientes');openModal('new')">+ Novo Cliente</button>
      </div>
    </div>
    <div class="content" id="main-content">
      <div class="empty-state"><div class="empty-icon">⏳</div><p>Carregando...</p></div>
    </div>
  </div>

</div>

<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/data.js?v=3.0"></script>
<script src="js/gemini.js?v=3.0"></script>
<script src="js/supabase-client.js?v=3.0"></script>
<script src="js/app.js?v=3.0"></script>
<script src="js/modules.js?v=3.0"></script>
<script src="js/seed.js?v=3.0"></script>
<script src="js/onboarding-engine.js?v=3.0"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    try {
      if (typeof bootstrapAppOnce === 'function') bootstrapAppOnce();
      else if (typeof bootstrapApp === 'function') bootstrapApp();
    } catch(e) {
      console.error('[index.html] bootstrapApp falhou:', e);
    }
  });
  window.addEventListener('load', () => {
    const el = document.getElementById('gemini-status-sidebar');
    if (el) el.textContent = (typeof getApiKey === 'function' && getApiKey()) ? '🤖 Gemini AI ativo' : '';
    const cfg = JSON.parse(localStorage.getItem('app_config') || '{}');
    if (cfg.google_client_id) window.GOOGLE_CLIENT_ID = cfg.google_client_id;
    const c = JSON.parse(localStorage.getItem('clientes') || '[]');
    if (c.length === 0 && typeof initSeed === 'function') {
      if (typeof initDB === 'function') initDB();
      initSeed();
      if (typeof navigate === 'function') navigate('dashboard');
    }
    // Update sidebar count
    const countEl = document.getElementById('sidebar-count');
    if (countEl) {
      const clientes = JSON.parse(localStorage.getItem('clientes') || '[]');
      countEl.textContent = `${clientes.length} clientes cadastrados`;
    }
  });
</script>

</body>
</html>
