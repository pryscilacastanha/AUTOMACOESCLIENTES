<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criscontab &amp; Madeira — Sistema de Automação Contábil</title>
  <meta name="description" content="Sistema de gestão contábil multitenant — Criscontab &amp; Madeira Contabilidade">
  <link rel="stylesheet" href="css/app.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ── -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">
        <div class="logo-icon">📊</div>
        <div>
          <div class="logo-text">Criscontab &amp; Madeira</div>
          <div class="logo-sub">Gestão Contábil</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">🏠</span><span>Dashboard</span>
      </button>
      <button class="nav-item" data-page="controle" onclick="navigate('controle')">
        <span class="nav-icon">👥</span><span>Clientes</span>
      </button>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <button class="nav-item" data-page="checklist" onclick="navigate('checklist')">
        <span class="nav-icon">✅</span><span>Checklist Mensal</span>
      </button>
      <button class="nav-item" data-page="painel" onclick="navigate('painel')">
        <span class="nav-icon">🗂️</span><span>Painel de Entregas</span>
      </button>
      <button class="nav-item" data-page="onboarding" onclick="navigate('onboarding')">
        <span class="nav-icon">📁</span><span>Onboarding</span>
      </button>
      <button class="nav-item" data-page="obrigacoes" onclick="navigate('obrigacoes')">
        <span class="nav-icon">📋</span><span>Obrigações</span>
      </button>
      <button class="nav-item" data-page="auditoria" onclick="navigate('auditoria')">
        <span class="nav-icon">🔍</span><span>Auditoria</span>
      </button>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <button class="nav-item" data-page="parecer" onclick="navigate('parecer')">
        <span class="nav-icon">📄</span><span>Parecer Técnico</span>
      </button>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <button class="nav-item" data-page="importacao" onclick="navigate('importacao')">
        <span class="nav-icon">🤖</span><span>Importar com IA</span>
      </button>
      <button class="nav-item" data-page="integracao" onclick="navigate('integracao')">
        <span class="nav-icon">🔄</span><span>Integração</span>
      </button>
      <button class="nav-item" data-page="planocontas" onclick="navigate('planocontas')">
        <span class="nav-icon">📊</span><span>Plano de Contas</span>
      </button>
      <button class="nav-item" data-page="treinamento" onclick="navigate('treinamento')">
        <span class="nav-icon">🎓</span><span>Treinamento</span>
      </button>
      <button class="nav-item" data-page="educacao" onclick="navigate('educacao')">
        <span class="nav-icon">📖</span><span>Educação Cliente</span>
      </button>
      <button class="nav-item" data-page="configuracoes" onclick="navigate('configuracoes')">
        <span class="nav-icon">⚙️</span><span>Configurações</span>
      </button>
    </div>

    <div style="padding:16px 20px;margin-top:auto;border-top:1px solid rgba(255,255,255,.07)">
      <div style="font-size:11px;color:#475569;line-height:1.7">
        <div style="color:#64748b;font-weight:600;margin-bottom:2px" id="sidebar-count">87 clientes cadastrados</div>
        Sistema contábil v2.1<br>
        <span id="gemini-status-sidebar" style="color:#10b981"></span>
      </div>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="topbar">
      <div>
        <div id="topbar-title" class="topbar-title">Dashboard</div>
        <div class="topbar-sub">Criscontab &amp; Madeira Contabilidade</div>
      </div>
      <div class="topbar-actions">
        <label style="font-size:13px;font-weight:600;color:var(--text-muted)">Competência:</label>
        <input type="month" id="comp-topbar" class="competencia-select">
        <button class="btn btn-primary" onclick="navigate('clientes');openModal('new')">+ Novo Cliente</button>
      </div>
    </div>
    <div class="content" id="main-content">
      <div class="empty-state"><div class="empty-icon">⏳</div><p>Carregando...</p></div>
    </div>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/gemini.js"></script>
<script src="js/app.js"></script>
<script src="js/modules.js"></script>
<script src="js/seed.js"></script>
<script>
  function resetarDados() {
    if (!confirm('Apagar todos os dados operacionais e recarregar base dos clientes?')) return;
    localStorage.clear();
    location.reload();
  }
  // Inicialização — DOMContentLoaded garante todos os scripts carregados
  document.addEventListener('DOMContentLoaded', () => {
    try {
      if (typeof bootstrapAppOnce === 'function') bootstrapAppOnce();
      else if (typeof bootstrapApp === 'function') bootstrapApp();
    } catch(e) {
      console.error('[index.html] bootstrapApp falhou:', e);
    }
  });
  // Fallback de segurança — garante seed após load completo
  window.addEventListener('load', () => {
    const el = document.getElementById('gemini-status-sidebar');
    if (el) el.textContent = (typeof getApiKey === 'function' && getApiKey()) ? '🤖 Gemini AI ativo' : '';
    // Se clientes vazio, tenta seed novamente
    const c = JSON.parse(localStorage.getItem('clientes') || '[]');
    if (c.length === 0 && typeof initSeed === 'function') {
      console.log('[Fallback] Clientes vazio, rodando initSeed...');
      if (typeof initDB === 'function') initDB();
      initSeed();
      if (typeof navigate === 'function') navigate('dashboard');
    }
  });
</script>
</body>
</html>
