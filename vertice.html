<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vértice — Plataforma de Gestão Integrada</title>
  <meta name="description" content="Sistema unificado de gestão — Consultoria, Contabilidade, Financeiro, Societário, Revenda SCI e DCC">
  <link rel="stylesheet" href="css/vertice.css">
  <link rel="stylesheet" href="css/fin-style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <style>
    /* Scope financeiro styles to avoid collision */
    #fin-embed .sidebar { display: none !important; }
    #fin-embed .main { width:100% !important; }
    #fin-embed .page-header { display: none !important; }
    /* Override financeiro-only styles that conflict */
    .fin-content .cards-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
    .fin-content .card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--card-border); box-shadow: var(--card-shadow); padding: 20px; flex: 1; min-width: 180px; }
    .fin-content .section { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--card-border); box-shadow: var(--card-shadow); margin-bottom: 16px; overflow: hidden; }
    .fin-content .section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #f1f5f9; }
    .fin-content .section-title { font-size: 15px; font-weight: 700; }
    .fin-content .section-badge { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 99px; }
    .fin-content .tbl { padding: 0; }
    .fin-content table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .fin-content thead th { background: #f8fafc; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--card-border); }
    .fin-content tbody td { padding: 11px 14px; border-bottom: 1px solid #f1f5f9; }
    .fin-content tbody tr:hover { background: #f8fafc; }
    .fin-content .tbl-footer { background: #f8fafc; font-weight: 600; }
    .fin-content .c-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .fin-content .c-value { font-size: 24px; font-weight: 800; letter-spacing: -.02em; }
    .fin-content .c-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
    .fin-content .c-icon { font-size: 20px; margin-bottom: 8px; }
    .fin-content .v-emerald { color: #10b981; }
    .fin-content .v-rose { color: #ef4444; }
    .fin-content .v-amber { color: #f59e0b; }
    .fin-content .v-blue { color: #3b82f6; }
    .fin-content .v-purple { color: #8b5cf6; }
    .fin-content .amt { font-weight: 700; font-size: 13px; }
    .fin-content .cred { display: flex; align-items: center; gap: 10px; }
    .fin-content .cred-av { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .fin-content .cred-n { font-weight: 600; font-size: 13px; }
    .fin-content .cred-d { font-size: 11px; color: var(--text-3); }
    .fin-content .cat { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
    .fin-content .st { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 500; }
    .fin-content .st-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .fin-content .st-e .st-dot { background: #10b981; }
    .fin-content .st-r .st-dot { background: #ef4444; }
    .fin-content .st-a .st-dot { background: #f59e0b; }
    .fin-content .st-b .st-dot { background: #3b82f6; }
    .fin-content .st-p .st-dot { background: #8b5cf6; }
    .fin-content .pri { font-size: 11px; font-weight: 600; }
    .fin-content .act { font-size: 11px; font-weight: 600; }
    .fin-content .action-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .fin-content .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 12.5px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; font-family: inherit; }
    .fin-content .btn-primary { background: var(--accent); color: #fff; }
    .fin-content .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid #e2e8f0; }
    .fin-content .btn-success { background: var(--success); color: #fff; }
    .fin-content .btn-danger { background: var(--danger); color: #fff; }
    .fin-content .btn-sm { padding: 5px 10px; font-size: 11px; }
    .fin-content .status-select { padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; background: #f8fafc; font-family: inherit; cursor: pointer; }
    .fin-content .expand-btn { background: none; border: none; cursor: pointer; font-size: 10px; padding: 4px 6px; border-radius: 4px; transition: all .15s; color: var(--text-3); }
    .fin-content .expand-btn:hover { background: #f1f5f9; }
    .fin-content .detail-row { display: none; }
    .fin-content .detail-row.show { display: table-row; }
    .fin-content .detail-content { padding: 14px 20px; background: #fafbff; border-left: 3px solid var(--accent); }
    .fin-content .detail-section { margin-bottom: 10px; }
    .fin-content .detail-label { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; margin-bottom: 4px; }
    .fin-content .cards-3 { }
    .fin-content .cards-4 { }
    .fin-content .cards-5 { }
    .fin-content .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .fin-content .alert { display: flex; align-items: flex-start; gap: 14px; padding: 16px 20px; border-radius: var(--radius); margin-bottom: 16px; }
    .fin-content .alert span:first-child { font-size: 24px; }
    .fin-content .alert h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .fin-content .alert p { font-size: 12.5px; color: var(--text-2); }
    .fin-content .alert-r { background: #fef2f2; border: 1px solid #fecaca; }
    .fin-content .alert-b { background: #eff6ff; border: 1px solid #bfdbfe; }
    .fin-content .alert-e { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .fin-content .alert-a { background: #fffbeb; border: 1px solid #fde68a; }
    .fin-content .flow { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .fin-content .flow-step { padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; background: #f1f5f9; color: var(--text-3); border: 1px solid #e2e8f0; }
    .fin-content .flow-step.current { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
    .fin-content .flow-step.pending { opacity: .5; }
    .fin-content .flow-arrow { color: var(--text-3); font-size: 14px; }
    .fin-content .bar { background: #e2e8f0; border-radius: 99px; height: 6px; overflow: hidden; flex: 1; }
    .fin-content .bar-fill { height: 100%; border-radius: 99px; transition: width .5s; }
    .fin-content .goal { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #f1f5f9; }
    .fin-content .goal-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .fin-content .goal-status.urgente { background: #ef4444; }
    .fin-content .goal-status.ativo, .fin-content .goal-status.em_andamento { background: #10b981; }
    .fin-content .goal-status.pendente, .fin-content .goal-status.planejado { background: #94a3b8; }
    .fin-content .goal-status.judicial { background: #8b5cf6; }
    .fin-content .goal-text { font-size: 13px; flex: 1; }
    .fin-content .goal-prazo { font-size: 11px; color: var(--text-3); font-weight: 600; }
    .fin-content .year-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .fin-content .year-tab { padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; background: #f1f5f9; color: var(--text-3); border: 1px solid #e2e8f0; transition: all .2s; }
    .fin-content .year-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .fin-content .chart-container { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--card-border); padding: 20px; box-shadow: var(--card-shadow); }
    .fin-content .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .fin-content .chart-legend { display: flex; gap: 16px; margin-bottom: 14px; font-size: 12px; color: var(--text-2); }
    .fin-content .chart-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .fin-content .chart-bars { display: flex; gap: 6px; align-items: flex-end; height: 180px; }
    .fin-content .chart-bar-group { flex: 1; text-align: center; }
    .fin-content .chart-bar-pair { display: flex; gap: 2px; justify-content: center; align-items: flex-end; height: 170px; }
    .fin-content .chart-bar { width: 16px; border-radius: 4px 4px 0 0; transition: height .4s ease; }
    .fin-content .chart-bar.entrada { background: #10b981; }
    .fin-content .chart-bar.saida { background: #ef4444; }
    .fin-content .chart-bar.empty { background: #e2e8f0; }
    .fin-content .chart-bar-label { font-size: 10px; color: var(--text-3); margin-top: 4px; font-weight: 600; }
    .fin-content .chart-edit-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f1f5f9; }
    .fin-content .chart-edit-mes { font-size: 12px; font-weight: 600; width: 70px; }
    .fin-content .chart-edit-label { font-size: 11px; color: var(--text-3); }
    .fin-content .edit-input { padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; width: 100px; font-family: inherit; }
    .fin-content .patri-bar { display: flex; height: 20px; border-radius: 99px; overflow: hidden; }
    .fin-content .patri-bar .seg { display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; }
    .fin-content .split-bar { display: flex; height: 28px; border-radius: 8px; overflow: hidden; }
    .fin-content .split-mae { background: #3b82f6; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 600; }
    .fin-content .split-pai { background: #f59e0b; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 600; }
    .fin-content .legal-article { padding: 14px 20px; border-bottom: 1px solid #f1f5f9; }
    .fin-content .legal-ref { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .fin-content .legal-text { font-size: 13px; color: var(--text-2); font-style: italic; line-height: 1.5; }
    .fin-content .pgto-tag { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 6px; background: var(--accent-bg); color: var(--accent); }
    .fin-content .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .fin-content .modal { background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .fin-content .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
    .fin-content .modal-field { margin-bottom: 12px; }
    .fin-content .modal-label { font-size: 12px; font-weight: 600; color: var(--text-2); display: block; margin-bottom: 4px; }
    .fin-content .modal-input { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: inherit; }
    .fin-content .modal-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .fin-content .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fin-content .modal-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .fin-content .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid #f1f5f9; }
    .fin-content .anim { animation: fadeIn .35s ease forwards; }
    @media (max-width: 768px) {
      .fin-content .g2 { grid-template-columns: 1fr; }
      .fin-content .modal-row, .fin-content .modal-row-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ═══════════════ SIDEBAR ═══════════════ -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">🔺</div>
        <div>
          <div class="brand-name">Vértice</div>
          <div class="brand-sub">Plataforma de Gestão</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <button class="nav-item active" data-page="home" onclick="V.nav('home')">
        <span class="nav-icon">🏠</span><span>Dashboard</span>
      </button>
    </div>

    <!-- ── CONSULTORIA ── -->
    <div class="sidebar-section">
      <div class="module-group">
        <button class="module-group-toggle open" onclick="V.toggleGroup(this)">
          <span class="mgt-dot" style="background:var(--mod-consultoria)"></span>
          <span>Consultoria</span>
          <span class="mgt-chevron">›</span>
        </button>
        <div class="module-group-body open">
          <button class="nav-item" data-page="crm" onclick="V.nav('crm')">
            <span class="nav-icon">📊</span><span>CRM / Pipeline</span>
          </button>
          <button class="nav-item" data-page="planejamento" onclick="V.nav('planejamento')">
            <span class="nav-icon">📋</span><span>Planej. Estratégico</span>
          </button>
          <button class="nav-item" data-page="contratos" onclick="V.nav('contratos')">
            <span class="nav-icon">📄</span><span>Contratos</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ── CONTABILIDADE ── -->
    <div class="sidebar-section">
      <div class="module-group">
        <button class="module-group-toggle open" onclick="V.toggleGroup(this)">
          <span class="mgt-dot" style="background:var(--mod-contabilidade)"></span>
          <span>Contabilidade</span>
          <span class="mgt-chevron">›</span>
        </button>
        <div class="module-group-body open">
          <button class="nav-item" data-page="carteira" onclick="V.nav('carteira')">
            <span class="nav-icon">🏢</span><span>Carteira de Clientes</span>
          </button>
          <button class="nav-item" data-page="escrituracao" onclick="V.nav('escrituracao')">
            <span class="nav-icon">📁</span><span>Escrituração 2025</span>
          </button>
          <button class="nav-item" data-page="obrigacoes" onclick="V.nav('obrigacoes')">
            <span class="nav-icon">📋</span><span>Obrigações Acessórias</span>
          </button>
          <button class="nav-item" data-page="conciliacao" onclick="V.nav('conciliacao')">
            <span class="nav-icon">🏦</span><span>Conciliação</span>
          </button>
          <button class="nav-item" data-page="educacao" onclick="V.nav('educacao')">
            <span class="nav-icon">📖</span><span>Educação Cliente</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ── FINANCEIRO ── -->
    <div class="sidebar-section">
      <div class="module-group">
        <button class="module-group-toggle" onclick="V.toggleGroup(this)">
          <span class="mgt-dot" style="background:var(--mod-financeiro)"></span>
          <span>Financeiro</span>
          <span class="mgt-chevron">›</span>
        </button>
        <div class="module-group-body">
          <button class="nav-item" data-page="fin-dashboard" onclick="V.nav('fin-dashboard')">
            <span class="nav-icon">📊</span><span>Dashboard</span>
          </button>
          <button class="nav-item" data-page="fin-receber" onclick="V.nav('fin-receber')">
            <span class="nav-icon">💰</span><span>Contas a Receber</span>
          </button>
          <button class="nav-item" data-page="fin-pagar" onclick="V.nav('fin-pagar')">
            <span class="nav-icon">💳</span><span>Contas a Pagar</span>
          </button>
          <button class="nav-item" data-page="fin-fluxo" onclick="V.nav('fin-fluxo')">
            <span class="nav-icon">📈</span><span>Fluxo de Caixa</span>
          </button>
          <button class="nav-item" data-page="fin-despesas" onclick="V.nav('fin-despesas')">
            <span class="nav-icon">📦</span><span>Despesas</span>
          </button>
          <button class="nav-item" data-page="fin-dividas" onclick="V.nav('fin-dividas')">
            <span class="nav-icon">🔴</span><span>Dívidas & Passivos</span>
          </button>
          <button class="nav-item" data-page="fin-patrimonio" onclick="V.nav('fin-patrimonio')">
            <span class="nav-icon">🏦</span><span>Patrimônio</span>
          </button>
          <button class="nav-item" data-page="fin-dependentes" onclick="V.nav('fin-dependentes')">
            <span class="nav-icon">👶</span><span>Dependentes</span>
          </button>
          <button class="nav-item" data-page="fin-legal" onclick="V.nav('fin-legal')">
            <span class="nav-icon">⚖️</span><span>Base Legal</span>
          </button>
          <button class="nav-item" data-page="fin-planejamento" onclick="V.nav('fin-planejamento')">
            <span class="nav-icon">🎯</span><span>Planejamento</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ── SOCIETÁRIO ── -->
    <div class="sidebar-section">
      <div class="module-group">
        <button class="module-group-toggle" onclick="V.toggleGroup(this)">
          <span class="mgt-dot" style="background:var(--mod-societario)"></span>
          <span>Societário</span>
          <span class="mgt-chevron">›</span>
        </button>
        <div class="module-group-body">
          <button class="nav-item" data-page="soc-diagnostico" onclick="V.nav('soc-diagnostico')">
            <span class="nav-icon">🔍</span><span>Diagnóstico</span>
          </button>
          <button class="nav-item" data-page="soc-holdings" onclick="V.nav('soc-holdings')">
            <span class="nav-icon">🏢</span><span>Holdings</span>
          </button>
          <button class="nav-item" data-page="soc-abertura" onclick="V.nav('soc-abertura')">
            <span class="nav-icon">📝</span><span>Abertura Empresas</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ── REVENDA SCI ── -->
    <div class="sidebar-section">
      <div class="module-group">
        <button class="module-group-toggle" onclick="V.toggleGroup(this)">
          <span class="mgt-dot" style="background:var(--mod-revenda)"></span>
          <span>Revenda SCI</span>
          <span class="mgt-chevron">›</span>
        </button>
        <div class="module-group-body">
          <button class="nav-item" data-page="rev-carteira" onclick="V.nav('rev-carteira')">
            <span class="nav-icon">👥</span><span>Carteira Clientes</span>
          </button>
          <button class="nav-item" data-page="rev-comercial" onclick="V.nav('rev-comercial')">
            <span class="nav-icon">📊</span><span>Gestão Comercial</span>
          </button>
          <button class="nav-item" data-page="rev-base" onclick="V.nav('rev-base')">
            <span class="nav-icon">📚</span><span>Base Conhecimento</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ── DCC ── -->
    <div class="sidebar-section">
      <div class="module-group">
        <button class="module-group-toggle" onclick="V.toggleGroup(this)">
          <span class="mgt-dot" style="background:var(--mod-dcc)"></span>
          <span>DCC</span>
          <span class="mgt-chevron">›</span>
        </button>
        <div class="module-group-body">
          <button class="nav-item" data-page="dcc-sistema" onclick="V.nav('dcc-sistema')">
            <span class="nav-icon">🏛️</span><span>Sistema Público</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ── CONFIG ── -->
    <div class="sidebar-section" style="margin-top:auto;">
      <button class="nav-item" data-page="config" onclick="V.nav('config')">
        <span class="nav-icon">⚙️</span><span>Configurações</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <strong>Vértice</strong> v1.0<br>
      Pryscila Castanha — Consultoria
    </div>
  </nav>

  <!-- ═══════════════ MAIN CONTENT ═══════════════ -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-sub" id="topbar-sub">Visão geral da plataforma Vértice</div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="main-content"></div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)V.closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<!-- Supabase SDK -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<!-- Supabase Client -->
<script src="js/supabase-client.js?v=2"></script>
<!-- Financial Data & Engine -->
<script src="js/fin-dados.js?v=2"></script>
<script src="js/fin-core.js?v=2"></script>
<script src="js/fin-contas.js?v=2"></script>
<script src="js/fin-fluxo.js?v=2"></script>
<script src="js/fin-pages.js?v=2"></script>
<!-- Main Vértice App -->
<script src="js/vertice-app.js?v=2"></script>
</body>
</html>
